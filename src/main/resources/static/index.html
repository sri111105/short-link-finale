<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener Service</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #007bff;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f8f9fa;
            font-weight: 600;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        a {
            color: #007bff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .delete-btn {
            padding: 6px 12px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .delete-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>

<body>

    <h1>URL Shortener Service</h1>

    <div class="container">
        <h2>Shorten a new URL</h2>
        <div class="input-group">
            <input type="text" id="longUrl" placeholder="Enter a long URL here..." required>
            <button onclick="shortenUrl()">Shorten</button>
        </div>
        <div id="result" style="margin-top: 10px;"></div>
    </div>

    <div class="container">
        <h2>Analytics Dashboard</h2>
        <button onclick="loadStats()" style="margin-bottom: 10px; background-color: #28a745;">Refresh Stats</button>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Original URL</th>
                    <th>Short URL</th>
                    <th>Clicks</th>
                    <th>Created Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="statsTableBody">
                <!-- Rows will be populated here -->
            </tbody>
        </table>
    </div>

    <script>
        async function shortenUrl() {
            const longUrl = document.getElementById('longUrl').value;
            if (!longUrl) {
                alert("Please enter a URL");
                return;
            }

            try {
                const response = await fetch('/api/urls/shorten', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ longUrl: longUrl })
                });

                if (response.ok) {
                    const data = await response.json();
                    const shortUrl = window.location.origin + "/" + data.shortCode;
                    document.getElementById('result').innerHTML =
                        `Short URL created: <a href="${shortUrl}" target="_blank">${shortUrl}</a>`;
                    document.getElementById('longUrl').value = '';
                    loadStats();
                } else {
                    alert("Error shortening URL");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Failed to shorten URL");
            }
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/urls/stats');
                const data = await response.json();
                const tbody = document.getElementById('statsTableBody');
                tbody.innerHTML = '';

                data.forEach(item => {
                    const shortUrl = window.location.origin + "/" + item.shortCode;
                    const row = `
                        <tr>
                            <td>${item.id}</td>
                            <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${item.longUrl}">
                                <a href="${item.longUrl}" target="_blank">${item.longUrl}</a>
                            </td>
                            <td><a href="${shortUrl}" target="_blank">${shortUrl}</a></td>
                            <td>${item.clickCount}</td>
                            <td>${new Date(item.createdDate).toLocaleString()}</td>
                            <td>
                                <button class="delete-btn" onclick="deleteUrl(${item.id})">Delete</button>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } catch (error) {
                console.error("Error loading stats:", error);
            }
        }

        async function deleteUrl(id) {
            if (!confirm('Are you sure you want to delete this URL?')) {
                return;
            }

            try {
                const response = await fetch(`/api/urls/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('URL deleted successfully');
                    loadStats();
                } else {
                    alert('Failed to delete URL');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to delete URL');
            }
        }

        // Load stats on page load
        loadStats();
    </script>
</body>

</html>
