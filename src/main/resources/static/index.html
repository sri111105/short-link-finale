<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShortLink | Premium URL Shortener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="header">
        <h1>ShortLink</h1>
        <p>Shorten your links, track your clicks, and grow your reach.</p>
    </div>

    <div class="container">
        <div class="card">
            <h2 style="font-weight: 700; font-size: 1.5rem;">Shorten a Link</h2>
            <div class="input-group">
                <input type="text" id="longUrl" placeholder="Paste your long URL here..." required>
                <button class="btn btn-primary" onclick="shortenUrl()">
                    <i data-lucide="link"></i>
                    Shorten
                </button>
            </div>
            <div id="resultArea" class="result-area">
                <p style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 4px;">Your short link is ready!</p>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <a id="shortUrlDisplay" href="#" target="_blank" class="url-link" style="font-size: 1.25rem;"></a>
                    <button class="btn" style="padding: 8px; background: transparent; color: var(--primary);" onclick="copyToClipboard()">
                        <i data-lucide="copy" style="width: 20px;"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2 style="font-weight: 700; font-size: 1.5rem;">Analytics Dashboard</h2>
                <button class="btn btn-refresh" onclick="loadStats()">
                    <i data-lucide="refresh-cw" style="width: 18px;"></i>
                    Refresh
                </button>
            </div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Original URL</th>
                            <th>Short Code</th>
                            <th>Clicks</th>
                            <th>Date Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="statsTableBody">
                        <!-- Rows populated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        async function shortenUrl() {
            const longUrlInput = document.getElementById('longUrl');
            const longUrl = longUrlInput.value;
            
            if (!longUrl) {
                showToast("Please enter a URL", "error");
                return;
            }

            try {
                const response = await fetch('/api/v1/urls/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ longUrl: longUrl })
                });

                if (response.ok) {
                    const data = await response.json();
                    const shortUrl = window.location.origin + "/" + data.shortCode;
                    
                    const resultArea = document.getElementById('resultArea');
                    const shortUrlDisplay = document.getElementById('shortUrlDisplay');
                    
                    shortUrlDisplay.href = shortUrl;
                    shortUrlDisplay.innerText = shortUrl;
                    resultArea.style.display = 'block';
                    
                    longUrlInput.value = '';
                    loadStats();
                } else {
                    showToast("Error shortening URL", "error");
                }
            } catch (error) {
                console.error("Error:", error);
                showToast("Connection failed", "error");
            }
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/v1/urls/stats');
                const data = await response.json();
                const tbody = document.getElementById('statsTableBody');
                tbody.innerHTML = '';

                data.sort((a, b) => new Date(b.createdDate) - new Date(a.createdDate)).forEach(item => {
                    const shortUrl = window.location.origin + "/" + item.shortCode;
                    const row = `
                        <tr>
                            <td title="${item.longUrl}">
                                <div style="max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                                    ${item.longUrl}
                                </div>
                            </td>
                            <td><a href="${shortUrl}" target="_blank" class="url-link">${item.shortCode}</a></td>
                            <td>
                                <span style="font-weight: 600; color: var(--primary);">
                                    ${item.clickCount}
                                </span>
                            </td>
                            <td style="font-size: 0.875rem; color: var(--text-muted);">
                                ${new Date(item.createdDate).toLocaleDateString()}
                            </td>
                            <td>
                                <button class="btn btn-delete" onclick="deleteUrl(${item.id})">
                                    <i data-lucide="trash-2" style="width: 16px;"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
                lucide.createIcons();
            } catch (error) {
                console.error("Error loading stats:", error);
            }
        }

        async function deleteUrl(id) {
            if (!confirm('Are you sure you want to delete this URL?')) return;

            try {
                const response = await fetch(`/api/v1/urls/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    loadStats();
                } else {
                    alert('Failed to delete URL');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function copyToClipboard() {
            const shortUrl = document.getElementById('shortUrlDisplay').innerText;
            navigator.clipboard.writeText(shortUrl).then(() => {
                alert("Link copied to clipboard!");
            });
        }

        function showToast(message, type) {
            alert(message); // Simple alert for now, can be improved to a toast
        }

        // Load stats on page load
        loadStats();
    </script>
</body>
</html>
